<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESGI Cloud Messenger</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ══════════ RESET & BASE ══════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --esgi-blue: #0057ff;
      --esgi-cyan: #00e5ff;
      --esgi-purple: #a855f7;
      --esgi-pink: #f472b6;
      --dark-bg: #05060f;
      --card-bg: rgba(15, 18, 40, 0.75);
      --glass: rgba(255,255,255,0.04);
      --glow: 0 0 20px rgba(0, 87, 255, .35), 0 0 60px rgba(0, 229, 255, .12);
    }

    body {
      min-height: 100vh;
      font-family: 'Fira Code', monospace;
      background: var(--dark-bg);
      color: #e2e8f0;
      overflow-x: hidden;
    }

    /* ══════════ ANIMATED BACKGROUND ══════════ */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(0,87,255,.25), transparent),
        radial-gradient(ellipse 60% 50% at 80% 110%, rgba(168,85,247,.2), transparent),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(0,229,255,.15), transparent);
    }

    /* Matrix rain canvas */
    #matrix-canvas {
      position: fixed; inset: 0; z-index: -1;
      opacity: .07;
      pointer-events: none;
    }

    /* ══════════ FLOATING PARTICLES ══════════ */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ══════════ HEADER ══════════ */
    header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
      position: relative;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      background: linear-gradient(135deg, var(--esgi-blue), var(--esgi-purple));
      padding: .5rem 1.6rem;
      border-radius: 50px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: .85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      box-shadow: var(--glow);
      margin-bottom: 1.2rem;
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .logo-badge svg {
      width: 22px; height: 22px;
      filter: drop-shadow(0 0 4px var(--esgi-cyan));
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(0,87,255,.35), 0 0 60px rgba(0,229,255,.12); }
      50%      { box-shadow: 0 0 30px rgba(0,87,255,.55), 0 0 90px rgba(168,85,247,.2); }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, var(--esgi-cyan) 50%, var(--esgi-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      line-height: 1.2;
    }

    h1 .accent {
      background: linear-gradient(90deg, var(--esgi-cyan), var(--esgi-pink));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .subtitle {
      margin-top: .5rem;
      font-size: .8rem;
      color: rgba(255,255,255,.4);
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    /* ══════════ MAIN CARD ══════════ */
    .container {
      max-width: 650px;
      margin: 0 auto 4rem;
      padding: 0 1.2rem;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 24px;
      padding: 2rem;
      box-shadow:
        0 8px 32px rgba(0,0,0,.4),
        inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--esgi-blue), transparent 40%, transparent 60%, var(--esgi-purple));
      z-index: -1;
      opacity: .35;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 1px;
    }

    /* ══════════ INPUT AREA ══════════ */
    .input-row {
      display: flex;
      gap: .75rem;
      margin-bottom: 1.8rem;
    }

    #msg {
      flex: 1;
      padding: .85rem 1.2rem;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: #e2e8f0;
      font-family: 'Fira Code', monospace;
      font-size: .9rem;
      outline: none;
      transition: all .3s ease;
    }

    #msg::placeholder { color: rgba(255,255,255,.25); }

    #msg:focus {
      border-color: var(--esgi-cyan);
      box-shadow: 0 0 0 3px rgba(0,229,255,.12), 0 0 20px rgba(0,229,255,.08);
      background: rgba(255,255,255,.06);
    }

    .btn-send {
      padding: .85rem 1.6rem;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--esgi-blue), var(--esgi-purple));
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all .3s ease;
      box-shadow: 0 4px 15px rgba(0,87,255,.3);
    }

    .btn-send:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0,87,255,.45), 0 0 40px rgba(168,85,247,.2);
    }

    .btn-send:active { transform: translateY(0) scale(.97); }

    .btn-send::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,.15) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform .5s;
    }
    .btn-send:hover::after { transform: translateX(100%); }

    /* ══════════ MESSAGES LIST ══════════ */
    .messages-header {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1rem;
      font-family: 'Orbitron', sans-serif;
      font-size: .7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
    }

    .messages-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,.1), transparent);
    }

    #list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .6rem;
      max-height: 420px;
      overflow-y: auto;
      padding-right: .3rem;
    }

    /* Scrollbar */
    #list::-webkit-scrollbar { width: 4px; }
    #list::-webkit-scrollbar-track { background: transparent; }
    #list::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--esgi-blue), var(--esgi-purple));
      border-radius: 4px;
    }

    #list li {
      padding: .8rem 1.1rem;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 12px;
      font-size: .88rem;
      line-height: 1.5;
      position: relative;
      transition: all .3s ease;
      animation: slideIn .4s ease backwards;
    }

    #list li:hover {
      background: rgba(255,255,255,.07);
      border-color: rgba(0,229,255,.15);
      box-shadow: 0 0 15px rgba(0,229,255,.06);
      transform: translateX(4px);
    }

    #list li::before {
      content: '>';
      position: absolute;
      left: -1rem;
      color: var(--esgi-cyan);
      opacity: 0;
      transition: all .3s ease;
      font-weight: bold;
    }
    #list li:hover::before { opacity: 1; left: -.6rem; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stagger animation */
    #list li:nth-child(1)  { animation-delay: .05s; }
    #list li:nth-child(2)  { animation-delay: .1s; }
    #list li:nth-child(3)  { animation-delay: .15s; }
    #list li:nth-child(4)  { animation-delay: .2s; }
    #list li:nth-child(5)  { animation-delay: .25s; }
    #list li:nth-child(6)  { animation-delay: .3s; }
    #list li:nth-child(7)  { animation-delay: .35s; }
    #list li:nth-child(8)  { animation-delay: .4s; }
    #list li:nth-child(9)  { animation-delay: .45s; }
    #list li:nth-child(10) { animation-delay: .5s; }

    /* ══════════ EMPTY STATE ══════════ */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: rgba(255,255,255,.2);
      font-size: .85rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: .8rem; }

    /* ══════════ FOOTER ══════════ */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: .65rem;
      color: rgba(255,255,255,.15);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ══════════ RESPONSIVE ══════════ */
    @media (max-width: 500px) {
      .input-row { flex-direction: column; }
      .card { padding: 1.4rem; }
    }

    /* ══════════ CURSOR BLINK ══════════ */
    .cursor-blink::after {
      content: '█';
      animation: blink 1s step-end infinite;
      color: var(--esgi-cyan);
      font-size: .7em;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

  <canvas id="matrix-canvas"></canvas>

  <header>
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      ESGI · Cloud
    </div>
    <h1>Cloud <span class="accent">Messenger</span></h1>
    <p class="subtitle">// real-time messaging system</p>
  </header>

  <div class="container">
    <div class="card">
      <div class="input-row">
        <input id="msg" placeholder="$ enter your message..." autocomplete="off" />
        <button class="btn-send" onclick="send()">Send</button>
      </div>

      <div class="messages-header">
        <span class="cursor-blink">Messages</span>
      </div>

      <ul id="list"></ul>
    </div>
  </div>

  <footer>ESGI 4AL — Cloud Computing — 2026</footer>

  <script src="script.js"></script>

  <script>
    /* ── Matrix rain effect ── */
    (function() {
      const c = document.getElementById('matrix-canvas');
      const ctx = c.getContext('2d');
      let cols, drops;
      const chars = 'ESGI01アイウエオカキクケコ{}[]<>/=;';

      function resize() {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
        const s = 14;
        cols = Math.floor(c.width / s);
        drops = Array(cols).fill(1);
      }
      resize();
      window.addEventListener('resize', resize);

      function draw() {
        ctx.fillStyle = 'rgba(5,6,15,.12)';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = '#0057ff';
        ctx.font = '14px Fira Code, monospace';
        for (let i = 0; i < cols; i++) {
          const ch = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(ch, i * 14, drops[i] * 14);
          if (drops[i] * 14 > c.height && Math.random() > .975) drops[i] = 0;
          drops[i]++;
        }
      }
      setInterval(draw, 55);
    })();

    /* ── Floating particles ── */
    (function() {
      const colors = ['var(--esgi-blue)','var(--esgi-cyan)','var(--esgi-purple)','var(--esgi-pink)'];
      for (let i = 0; i < 25; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 2;
        p.style.cssText = `
          width:${size}px;height:${size}px;
          left:${Math.random()*100}%;
          background:${colors[i%colors.length]};
          box-shadow:0 0 ${size*3}px ${colors[i%colors.length]};
          animation-duration:${Math.random()*8+6}s;
          animation-delay:${Math.random()*10}s;
        `;
        document.body.appendChild(p);
      }
    })();

    /* ── Enter to send ── */
    document.getElementById('msg').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') send();
    });
  </script>
</body>
</html>
